<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password · Cafe Backyard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --cream:#F7F0E6;--linen:#EDE3D5;--bark:#C4A882;--soil:#7A5C3E;
      --espresso:#3B2410;--moss:#5A6B4B;--rust:#B05A2F;--sand:#D9C9B0;
      --warm-white:#FBF7F2;
      --fd:'Playfair Display',Georgia,serif;--fb:'DM Sans','Segoe UI',sans-serif;
    }
    body{font-family:var(--fb);background:var(--espresso);min-height:100vh;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px);pointer-events:none;z-index:0;}
    .page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;position:relative;z-index:1;}
    .auth-card{background:var(--warm-white);border-radius:6px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.4);}

    /* HEADER */
    .card-head{background:var(--espresso);padding:28px 36px 24px;border-bottom:1px solid rgba(196,168,130,0.2);}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--bark);}
    .brand-name{font-family:var(--fd);font-size:1rem;color:var(--bark);}
    .brand-name em{font-style:italic;color:var(--sand);}
    .card-title{font-family:var(--fd);font-size:1.55rem;color:var(--cream);font-weight:400;}
    .card-title em{font-style:italic;color:var(--bark);}
    .card-sub{color:var(--sand);font-size:0.83rem;margin-top:5px;}

    /* STEP INDICATOR */
    .steps{display:flex;align-items:center;gap:6px;margin-top:16px;}
    .step-dot{width:8px;height:8px;border-radius:50%;background:rgba(196,168,130,0.25);transition:background 0.3s;}
    .step-dot.active{background:var(--bark);}
    .step-dot.done{background:var(--moss);}
    .step-label{font-size:0.72rem;color:var(--sand);margin-left:4px;letter-spacing:0.08em;}

    .card-body{padding:24px 36px 28px;}

    /* STEPS (shown/hidden) */
    .step-pane{display:none;}
    .step-pane.active{display:block;}

    .field{margin-bottom:15px;}
    .field label{display:block;font-size:0.71rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--soil);margin-bottom:5px;font-weight:500;}
    .field input{width:100%;padding:11px 13px;border:1.5px solid var(--sand);border-radius:3px;font-family:var(--fb);font-size:0.91rem;color:var(--espresso);background:var(--cream);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    .field input:focus{border-color:var(--soil);box-shadow:0 0 0 3px rgba(122,92,62,0.1);}
    .field input::placeholder{color:var(--bark);}

    .phone-row{display:flex;gap:8px;}
    .phone-prefix{padding:11px 13px;background:var(--linen);border:1.5px solid var(--sand);border-radius:3px;font-size:0.91rem;color:var(--soil);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;}
    .phone-row input{flex:1;}

    /* security question display */
    .question-box{background:var(--linen);border:1px solid var(--sand);border-radius:3px;padding:12px 14px;font-size:0.88rem;color:var(--espresso);margin-bottom:14px;line-height:1.5;}

    .pw-wrap{position:relative;}
    .pw-wrap input{padding-right:42px;}
    .pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:0.88rem;color:var(--bark);padding:2px;transition:color 0.2s;}
    .pw-toggle:hover{color:var(--soil);}

    .submit-btn{width:100%;padding:12px;background:var(--espresso);color:var(--cream);border:none;border-radius:3px;cursor:pointer;font-family:var(--fb);font-size:0.88rem;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;transition:background 0.2s,transform 0.15s;margin-top:4px;}
    .submit-btn:hover{background:var(--rust);transform:translateY(-1px);}
    .submit-btn:active{transform:scale(0.98);}
    .submit-btn:disabled{opacity:0.6;cursor:wait;transform:none;}

    .msg{font-size:0.82rem;text-align:center;margin-top:12px;padding:8px 12px;border-radius:3px;display:none;}
    .msg.error  {display:block;background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;}
    .msg.success{display:block;background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}

    .back-link{display:block;text-align:center;margin-top:16px;font-size:0.82rem;color:var(--rust);text-decoration:none;}
    .back-link:hover{text-decoration:underline;}

    .bottom-brand{text-align:center;padding:18px;position:relative;z-index:1;}
    .bottom-brand p{font-size:0.76rem;color:rgba(196,168,130,0.4);}
    .bottom-brand strong{color:var(--bark);font-family:var(--fd);font-style:italic;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="auth-card">

    <div class="card-head">
      <div class="brand"><div class="brand-dot"></div><div class="brand-name">Cafe <em>Backyard</em></div></div>
      <h1 class="card-title">Reset <em>password</em></h1>
      <p class="card-sub" id="head-sub">Enter your username and phone number.</p>
      <div class="steps">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
        <span class="step-label" id="step-label">Step 1 of 3</span>
      </div>
    </div>

    <div class="card-body">

      <!-- STEP 1: username + phone -->
      <div class="step-pane active" id="step1">
        <div class="field">
          <label>Username</label>
          <input id="s1-username" type="text" placeholder="your_username" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Registered phone number</label>
          <div class="phone-row">
            <span class="phone-prefix">+91</span>
            <input id="s1-phone" type="tel" placeholder="9876543210" maxlength="10"/>
          </div>
        </div>
        <button class="submit-btn" id="btn1" onclick="step1()">Continue</button>
        <div class="msg" id="msg1"></div>
        <a href="/login.html" class="back-link">← Back to login</a>
      </div>

      <!-- STEP 2: security answer -->
      <div class="step-pane" id="step2">
        <p style="font-size:0.82rem;color:var(--soil);margin-bottom:12px;">Answer your security question:</p>
        <div class="question-box" id="question-text"></div>
        <div class="field">
          <label>Your answer</label>
          <input id="s2-answer" type="text" placeholder="Your answer" autocomplete="off"/>
        </div>
        <button class="submit-btn" id="btn2" onclick="step2()">Verify Answer</button>
        <div class="msg" id="msg2"></div>
        <a href="#" class="back-link" onclick="goToStep(1);return false;">← Back</a>
      </div>

      <!-- STEP 3: new password -->
      <div class="step-pane" id="step3">
        <div class="field">
          <label>New password</label>
          <div class="pw-wrap">
            <input id="s3-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password"/>
            <button class="pw-toggle" type="button" onclick="togglePw('s3-password','pt1')" id="pt1">👁</button>
          </div>
        </div>
        <div class="field">
          <label>Confirm new password</label>
          <div class="pw-wrap">
            <input id="s3-confirm" type="password" placeholder="Re-enter password" autocomplete="new-password"/>
            <button class="pw-toggle" type="button" onclick="togglePw('s3-confirm','pt2')" id="pt2">👁</button>
          </div>
        </div>
        <button class="submit-btn" id="btn3" onclick="step3()">Reset Password</button>
        <div class="msg" id="msg3"></div>
      </div>

    </div>
  </div>
</div>

<div class="bottom-brand"><p>© 2024 <strong>Cafe Backyard</strong> · Made with warmth.</p></div>

<script>
// ── verified data carried across steps ───────────────────
let verifiedUsername = '';
let verifiedPhone    = '';

function showMsg(n, text, type) {
  const el = document.getElementById('msg' + n);
  el.textContent = text; el.className = 'msg ' + type;
}
function clearMsg(n) {
  const el = document.getElementById('msg' + n);
  el.textContent = ''; el.className = 'msg';
}

function togglePw(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn   = document.getElementById(btnId);
  if (input.type === 'password') { input.type = 'text';     btn.textContent = '🙈'; }
  else                           { input.type = 'password'; btn.textContent = '👁'; }
}

// ── Step navigation ───────────────────────────────────────
const subTexts = [
  'Enter your username and phone number.',
  'Answer your security question.',
  'Choose a new password.'
];

function goToStep(n) {
  document.querySelectorAll('.step-pane').forEach((p, i) => {
    p.classList.toggle('active', i + 1 === n);
  });
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.remove('active', 'done');
    if (i < n)      dot.classList.add('done');
    else if (i ===n) dot.classList.add('active');
  }
  document.getElementById('step-label').textContent = `Step ${n} of 3`;
  document.getElementById('head-sub').textContent = subTexts[n - 1];
}

// ── STEP 1: verify username + phone ──────────────────────
function step1() {
  const username = document.getElementById('s1-username').value.trim();
  const phone    = document.getElementById('s1-phone').value.trim();

  clearMsg(1);
  if (!username)              { showMsg(1, 'Please enter your username.', 'error'); return; }
  if (!phone)                 { showMsg(1, 'Please enter your phone number.', 'error'); return; }
  if (!/^\d{10}$/.test(phone)){ showMsg(1, 'Enter a valid 10-digit phone number.', 'error'); return; }

  const btn = document.getElementById('btn1');
  btn.textContent = 'Checking…'; btn.disabled = true;

  fetch('/forgot-password/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, phone: '+91' + phone })
  })
  .then(res => res.json())
  .then(data => {
    btn.textContent = 'Continue'; btn.disabled = false;
    if (data.error) { showMsg(1, data.error, 'error'); return; }

    // Store verified details and show question
    verifiedUsername = username;
    verifiedPhone    = '+91' + phone;
    document.getElementById('question-text').textContent = data.securityQuestion;
    goToStep(2);
  })
  .catch(() => {
    btn.textContent = 'Continue'; btn.disabled = false;
    showMsg(1, 'Network error. Please try again.', 'error');
  });
}

// ── STEP 2: verify security answer ───────────────────────
function step2() {
  const answer = document.getElementById('s2-answer').value.trim();
  clearMsg(2);
  if (!answer) { showMsg(2, 'Please enter your answer.', 'error'); return; }

  // We don't verify the answer here — we verify it on the server during reset
  // Just move to step 3 (server will reject wrong answer on final submit)
  goToStep(3);
}

// ── STEP 3: reset password ────────────────────────────────
function step3() {
  const answer      = document.getElementById('s2-answer').value.trim();
  const newPassword = document.getElementById('s3-password').value;
  const confirm     = document.getElementById('s3-confirm').value;

  clearMsg(3);
  if (!newPassword)         { showMsg(3, 'Please enter a new password.', 'error'); return; }
  if (newPassword.length<6) { showMsg(3, 'Password must be at least 6 characters.', 'error'); return; }
  if (newPassword !== confirm){ showMsg(3, 'Passwords do not match.', 'error'); return; }

  const btn = document.getElementById('btn3');
  btn.textContent = 'Resetting…'; btn.disabled = true;

  fetch('/forgot-password/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username:       verifiedUsername,
      phone:          verifiedPhone,
      securityAnswer: answer,
      newPassword
    })
  })
  .then(res => res.json())
  .then(data => {
    btn.textContent = 'Reset Password'; btn.disabled = false;
    if (data.error) {
      // Wrong answer — go back to step 2
      showMsg(3, data.error, 'error');
      if (data.error.toLowerCase().includes('answer')) {
        setTimeout(() => { goToStep(2); showMsg(2, 'Incorrect answer. Please try again.', 'error'); }, 800);
      }
      return;
    }
    showMsg(3, 'Password reset! Redirecting to login…', 'success');
    setTimeout(() => window.location.href = '/login.html', 1200);
  })
  .catch(() => {
    btn.textContent = 'Reset Password'; btn.disabled = false;
    showMsg(3, 'Network error. Please try again.', 'error');
  });
}

// Enter key support per step
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.step-pane.active').id;
  if (active === 'step1') step1();
  else if (active === 'step2') step2();
  else if (active === 'step3') step3();
});
</script>
</body>
</html>
