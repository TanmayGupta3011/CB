<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart · Cafe Backyard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:      #F7F0E6;
      --linen:      #EDE3D5;
      --bark:       #C4A882;
      --soil:       #7A5C3E;
      --espresso:   #3B2410;
      --moss:       #5A6B4B;
      --rust:       #B05A2F;
      --sand:       #D9C9B0;
      --warm-white: #FBF7F2;
      --fd: 'Playfair Display', Georgia, serif;
      --fb: 'DM Sans', 'Segoe UI', sans-serif;
    }
    body { font-family: var(--fb); background: var(--cream); color: var(--espresso); min-height: 100vh; }

    /* NAV */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--espresso); padding: 0 5vw; height: 62px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .logo { font-family: var(--fd); font-size: 1.3rem; color: var(--bark); }
    .logo em { font-style: italic; color: var(--cream); }
    .nav-links { display: flex; align-items: center; gap: 2px; }
    .nav-links a {
      color: var(--sand); text-decoration: none; font-size: 0.82rem;
      font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 8px 12px; border-radius: 2px; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--bark); }
    .nav-links a.active { color: var(--bark); }
    #logoutLink { background: rgba(196,168,130,0.15); border: 1px solid rgba(196,168,130,0.3); color: var(--bark) !important; margin-left: 4px; }

    /* PAGE HEADER */
    .page-header {
      background: var(--espresso); padding: 48px 5vw 42px;
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
    }
    .page-eyebrow {
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--bark); margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px; position: relative;
    }
    .page-eyebrow::before { content:''; display:block; width:28px; height:1px; background:var(--bark); }
    .page-header h1 {
      font-family: var(--fd); font-size: clamp(1.8rem, 4vw, 2.7rem);
      color: var(--cream); line-height: 1.15; position: relative; font-weight: 400;
    }
    .page-header h1 em { font-style: italic; color: var(--bark); }

    /* LAYOUT */
    .cart-layout {
      max-width: 880px; margin: 0 auto;
      padding: 40px 5vw 80px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px; align-items: start;
    }

    /* LEFT PANEL */
    .cart-panel {
      background: var(--warm-white); border: 1px solid var(--linen);
      border-radius: 4px; overflow: hidden;
    }
    .panel-head {
      background: var(--espresso); padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-head h2 { font-family: var(--fd); font-size: 1.05rem; color: var(--cream); font-weight: 400; }
    .item-count   { font-size: 0.78rem; color: var(--sand); }

    /* ITEM ROW */
    .cart-item-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px; border-bottom: 1px solid var(--linen);
      animation: fadeUp 0.3s ease both;
    }
    .cart-item-row:last-child { border-bottom: none; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

    .item-emoji { font-size: 2rem; flex-shrink: 0; width: 44px; text-align: center; }
    .item-info { flex: 1; }
    .item-name { font-size: 0.92rem; font-weight: 500; color: var(--espresso); margin-bottom: 2px; }
    .item-unit  { font-size: 0.78rem; color: var(--soil); }

    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 28px; height: 28px; background: var(--linen); color: var(--espresso);
      border: none; border-radius: 2px; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--sand); }
    .qty-num { font-size: 0.88rem; font-weight: 600; min-width: 22px; text-align: center; }

    .item-subtotal { font-family: var(--fd); font-size: 1rem; color: var(--rust); min-width: 54px; text-align: right; }
    .remove-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--sand); font-size: 1rem; padding: 4px; transition: color 0.2s;
    }
    .remove-btn:hover { color: var(--rust); }

    /* EMPTY */
    .cart-empty {
      text-align: center; padding: 60px 20px;
    }
    .cart-empty .icon { font-size: 3rem; margin-bottom: 14px; }
    .cart-empty h3 { font-family: var(--fd); font-size: 1.3rem; margin-bottom: 8px; }
    .cart-empty p { color: var(--soil); font-size: 0.88rem; margin-bottom: 20px; }
    .cart-empty a {
      display: inline-block; background: var(--espresso); color: var(--cream);
      text-decoration: none; font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 11px 24px; border-radius: 2px; transition: background 0.2s;
    }
    .cart-empty a:hover { background: var(--rust); }

    /* RIGHT: SUMMARY PANEL */
    .summary-panel {
      background: var(--warm-white); border: 1px solid var(--linen);
      border-radius: 4px; overflow: hidden;
      position: sticky; top: 82px;
    }
    .summary-panel .panel-head h2 { font-family: var(--fd); font-size: 1.05rem; color: var(--cream); font-weight: 400; }
    .summary-body { padding: 18px 20px; }

    .sum-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 0.85rem; color: var(--soil); margin-bottom: 8px;
    }
    .sum-row.total {
      border-top: 1px solid var(--linen); padding-top: 12px; margin-top: 6px;
      color: var(--espresso); font-size: 1rem;
    }
    .sum-row.total span:last-child { font-family: var(--fd); font-size: 1.4rem; }

    .addr-label {
      display: block; font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--soil); margin: 16px 0 6px;
    }
    .addr-input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--sand); border-radius: 2px;
      font-family: var(--fb); font-size: 0.88rem;
      color: var(--espresso); background: var(--cream);
      outline: none; resize: vertical; min-height: 68px;
      transition: border-color 0.2s;
    }
    .addr-input:focus { border-color: var(--soil); }
    .addr-input::placeholder { color: var(--bark); }

    .place-btn {
      width: 100%; margin-top: 13px; padding: 13px;
      background: var(--espresso); color: var(--cream);
      border: none; border-radius: 2px; cursor: pointer;
      font-family: var(--fb); font-size: 0.88rem; font-weight: 500;
      letter-spacing: 0.07em; text-transform: uppercase;
      transition: background 0.2s;
    }
    .place-btn:hover { background: var(--rust); }
    .place-btn:disabled { background: var(--sand); color: var(--soil); cursor: not-allowed; }

    .order-msg { font-size: 0.82rem; text-align: center; margin-top: 10px; min-height: 18px; }
    .order-msg.error   { color: var(--rust); }
    .order-msg.success { color: var(--moss); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--espresso); color: var(--cream);
      padding: 11px 24px; border-radius: 2px; font-size: 0.85rem; font-weight: 500;
      border-left: 3px solid var(--bark);
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 500; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer {
      background: var(--espresso); color: var(--sand);
      text-align: center; padding: 28px 5vw; font-size: 0.82rem;
      border-top: 1px solid rgba(196,168,130,0.15);
    }
    footer strong { color: var(--bark); font-family: var(--fd); font-style: italic; }

    @media (max-width: 680px) {
      .cart-layout { grid-template-columns: 1fr; }
      .summary-panel { position: static; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Cafe <em>Backyard</em></div>
  <div class="nav-links" id="navLinks">
    <a href="/">Menu</a>
    <a href="/offers.html">Offers</a>
    <a href="/profile.html">My Orders</a>
    <a href="/cart.html" class="active">🛒 Cart</a>
    <a href="/login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" style="display:none;" onclick="logout(); return false;">Logout</a>
  </div>
</nav>

<div class="page-header">
  <p class="page-eyebrow">Ready to order</p>
  <h1>Your <em>Cart</em></h1>
</div>

<div class="cart-layout">
  <div>
    <div class="cart-panel">
      <div class="panel-head">
        <h2>Order items</h2>
        <span class="item-count" id="item-count"></span>
      </div>
      <div id="cart-items-list"></div>
    </div>
  </div>

  <div>
    <div class="summary-panel">
      <div class="panel-head">
        <h2>Order summary</h2>
      </div>
      <div class="summary-body">
        <div id="summary-rows"></div>
        <div class="sum-row total">
          <span>Total</span>
          <span id="grand-total">₹0</span>
        </div>
        <label class="addr-label" for="address">Delivery address</label>
        <textarea class="addr-input" id="address" placeholder="Enter your full delivery address…"></textarea>
        <button class="place-btn" id="place-btn" disabled>Place Order</button>
        <div class="order-msg" id="order-msg"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>© 2024 <strong>Cafe Backyard</strong> · Made with warmth &amp; good beans.</p>
</footer>

<div class="toast" id="toast"></div>

<script>
function itemEmoji(name) {
  const n = name.toLowerCase();
  if (/coffee|espresso|latte|cappuccino|mocha|americano|brew/i.test(n)) return '☕';
  if (/tea|chai|matcha|herbal/i.test(n)) return '🍵';
  if (/cake|muffin|brownie|pastry|cookie|scone|biscuit/i.test(n)) return '🧁';
  if (/sandwich|wrap|burger|roll|toast/i.test(n)) return '🥪';
  if (/salad|bowl|soup/i.test(n)) return '🥗';
  if (/juice|shake|smoothie|lassi/i.test(n)) return '🥤';
  return '🍽️';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
function setMsg(msg, type) {
  const el = document.getElementById('order-msg');
  el.textContent = msg; el.className = 'order-msg ' + (type || '');
}

// ── CART STATE ────────────────────────────────────────────
let cart = JSON.parse(localStorage.getItem("cart")) || [];
function saveCart() { localStorage.setItem("cart", JSON.stringify(cart)); }

function increaseQty(i) { cart[i].qty++; saveCart(); renderCart(); }
function decreaseQty(i) {
  if (cart[i].qty > 1) cart[i].qty--;
  else cart.splice(i, 1);
  saveCart(); renderCart();
}
function removeItem(i) { cart.splice(i, 1); saveCart(); renderCart(); }

// ── RENDER ────────────────────────────────────────────────
function renderCart() {
  const list    = document.getElementById('cart-items-list');
  const countEl = document.getElementById('item-count');
  const totalEl = document.getElementById('grand-total');
  const sumEl   = document.getElementById('summary-rows');
  const btn     = document.getElementById('place-btn');

  if (!cart.length) {
    list.innerHTML = `
      <div class="cart-empty">
        <div class="icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Go back and add something delicious!</p>
        <a href="/">Browse menu</a>
      </div>`;
    countEl.textContent = '';
    totalEl.textContent = '₹0';
    sumEl.innerHTML = '';
    btn.disabled = true;
    return;
  }

  btn.disabled = false;
  const qty = cart.reduce((s, i) => s + i.qty, 0);
  const amt = cart.reduce((s, i) => s + i.price * i.qty, 0);
  countEl.textContent = qty + (qty === 1 ? ' item' : ' items');
  totalEl.textContent = '₹' + amt;

  sumEl.innerHTML = cart.map(i => `
    <div class="sum-row">
      <span>${i.name} × ${i.qty}</span>
      <span>₹${i.price * i.qty}</span>
    </div>`).join('');

  list.innerHTML = '';
  cart.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'cart-item-row';
    row.style.animationDelay = (i * 0.04) + 's';
    row.innerHTML = `
      <div class="item-emoji">${itemEmoji(item.name)}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-unit">₹${item.price} each</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="decreaseQty(${i})">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="increaseQty(${i})">+</button>
      </div>
      <div class="item-subtotal">₹${item.price * item.qty}</div>
      <button class="remove-btn" onclick="removeItem(${i})">✕</button>`;
    list.appendChild(row);
  });
}

// ── PLACE ORDER ───────────────────────────────────────────
document.getElementById('place-btn').addEventListener('click', () => {
  const address = document.getElementById('address').value.trim();
  if (!cart.length) { showToast("Your cart is empty!"); return; }
  if (!address)     { setMsg("Please enter a delivery address.", "error"); return; }

  const btn = document.getElementById('place-btn');
  btn.disabled = true; btn.textContent = 'Placing order…';

  fetch("/orders", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items: cart, address })
  })
  .then(res => {
    if (!res.ok) return res.json().then(e => { throw e; });
    return res.json();
  })
  .then(() => {
    cart = []; saveCart();
    setMsg("Order placed! Redirecting… 🌿", "success");
    setTimeout(() => window.location.href = "/profile.html", 1200);
  })
  .catch(err => {
    btn.disabled = false; btn.textContent = 'Place Order';
    const msg = err.error || "Please login first";
    setMsg(msg, "error");
    if (msg.toLowerCase().includes("login"))
      setTimeout(() => window.location.href = "/login.html", 1400);
  });
});

// ── AUTH CHECK ────────────────────────────────────────────
fetch("/myorders")
  .then(res => {
    if (res.ok) {
      document.getElementById("loginLink").style.display  = "none";
      document.getElementById("logoutLink").style.display = "inline";
    }
  }).catch(() => {});

function logout() {
  fetch("/logout", { method: "POST" })
    .then(() => window.location.href = "/login.html");
}

renderCart();
</script>
</body>
</html>
