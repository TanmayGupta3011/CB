<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Offers · Cafe Backyard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --cream:#F7F0E6;--linen:#EDE3D5;--bark:#C4A882;--soil:#7A5C3E;
      --espresso:#3B2410;--moss:#5A6B4B;--rust:#B05A2F;--sand:#D9C9B0;
      --warm-white:#FBF7F2;
      --fd:'Playfair Display',Georgia,serif;
      --fb:'DM Sans','Segoe UI',sans-serif;
    }
    body{font-family:var(--fb);background:var(--cream);color:var(--espresso);min-height:100vh;}

    /* ── NAV ── */
    .navbar{
      display:flex;justify-content:space-between;align-items:center;
      background:var(--espresso);padding:0 5vw;height:62px;
      position:sticky;top:0;z-index:200;
      box-shadow:0 2px 16px rgba(0,0,0,0.3);
    }
    .logo{font-family:var(--fd);font-size:1.3rem;color:var(--bark);}
    .logo em{font-style:italic;color:var(--cream);}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nav-links a{
      color:var(--sand);text-decoration:none;font-size:0.82rem;font-weight:500;
      letter-spacing:0.07em;text-transform:uppercase;
      padding:8px 12px;border-radius:2px;transition:color 0.2s;
    }
    .nav-links a:hover{color:var(--bark);}
    .nav-links a.active{color:var(--bark);}
    #logoutLink{background:rgba(196,168,130,0.15);border:1px solid rgba(196,168,130,0.3);color:var(--bark)!important;margin-left:4px;}

    /* cart link with badge */
    .cart-link{position:relative;display:inline-flex;align-items:center;gap:5px;}
    #cartBadge{
      background:var(--rust);color:#fff;border-radius:50%;
      width:18px;height:18px;font-size:0.65rem;font-weight:700;
      display:none;align-items:center;justify-content:center;
      position:absolute;top:-6px;right:-8px;line-height:1;
    }

    /* ── HERO ── */
    .hero{
      background:var(--espresso);padding:64px 5vw 52px;
      position:relative;overflow:hidden;
    }
    .hero::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 55% 70% at 80% 50%,rgba(196,168,130,0.08) 0%,transparent 70%),
        repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px);
      pointer-events:none;
    }
    .hero-inner{position:relative;max-width:540px;}
    .hero-eyebrow{
      font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;
      color:var(--bark);margin-bottom:14px;
      display:flex;align-items:center;gap:10px;
    }
    .hero-eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--bark);}
    .hero h1{
      font-family:var(--fd);font-size:clamp(2.1rem,5vw,3.2rem);
      color:var(--cream);line-height:1.13;margin-bottom:10px;
    }
    .hero h1 em{font-style:italic;color:var(--bark);}
    .hero-sub{color:var(--sand);font-size:0.97rem;line-height:1.7;}

    /* ── SECTION ── */
    .section-title{
      font-family:var(--fd);font-size:clamp(1.4rem,2.5vw,1.9rem);
      text-align:center;color:var(--espresso);margin:44px 0 6px;
    }
    .section-sub{text-align:center;color:var(--soil);font-size:0.87rem;margin-bottom:32px;}

    /* ── OFFERS GRID ── */
    #offers{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
      gap:22px;padding:0 5vw 70px;
    }

    /* ── OFFER CARD ── */
    .offer-card{
      background:var(--warm-white);border:1px solid var(--linen);
      border-radius:4px;overflow:hidden;
      display:flex;flex-direction:column;
      transition:transform 0.24s,box-shadow 0.24s;
      animation:fadeUp 0.35s ease both;
    }
    .offer-card:hover{transform:translateY(-5px);box-shadow:0 12px 36px rgba(59,36,16,0.15);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

    .food-img{width:100%;height:180px;object-fit:cover;display:block;}
    .offer-no-img{
      height:110px;background:var(--espresso);
      display:flex;align-items:center;justify-content:center;
      font-size:2.8rem;
    }

    .offer-body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column;}

    .offer-tag{
      font-size:0.67rem;letter-spacing:0.14em;text-transform:uppercase;
      color:var(--rust);font-weight:500;margin-bottom:6px;
    }
    .offer-title{
      font-family:var(--fd);font-size:1.12rem;color:var(--espresso);
      line-height:1.3;margin-bottom:7px;
    }
    .offer-desc{
      font-size:0.84rem;color:var(--soil);line-height:1.65;
      flex:1;margin-bottom:16px;
    }

    .offer-footer{
      display:flex;align-items:center;justify-content:space-between;
      border-top:1px solid var(--linen);padding-top:14px;gap:10px;
    }
    .offer-price{font-family:var(--fd);font-size:1.25rem;color:var(--rust);}

    /* ADD TO CART BUTTON */
    .add-btn{
      background:var(--espresso);color:var(--cream);
      border:none;cursor:pointer;
      font-family:var(--fb);font-size:0.77rem;font-weight:500;
      letter-spacing:0.05em;text-transform:uppercase;
      padding:9px 16px;border-radius:2px;
      transition:background 0.18s,transform 0.15s;
      white-space:nowrap;flex-shrink:0;
    }
    .add-btn:hover{background:var(--rust);transform:scale(1.03);}
    .add-btn:active{transform:scale(0.97);}

    /* added state */
    .add-btn.added{background:var(--moss);}

    /* ── EMPTY / SKELETON ── */
    .empty-state{
      grid-column:1/-1;text-align:center;padding:70px 20px;
      background:var(--warm-white);border:1px solid var(--linen);border-radius:4px;
    }
    .empty-state .icon{font-size:3rem;margin-bottom:14px;}
    .empty-state h3{font-family:var(--fd);font-size:1.3rem;margin-bottom:8px;}
    .empty-state p{color:var(--soil);font-size:0.88rem;}

    .skel{
      background:linear-gradient(90deg,var(--linen) 25%,var(--sand) 50%,var(--linen) 75%);
      background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;
    }
    @keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--espresso);color:var(--cream);
      padding:11px 24px;border-radius:2px;font-size:0.85rem;font-weight:500;
      border-left:3px solid var(--bark);
      opacity:0;transition:opacity 0.3s,transform 0.3s;
      pointer-events:none;z-index:500;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    footer{
      background:var(--espresso);color:var(--sand);
      text-align:center;padding:28px 5vw;font-size:0.82rem;
      border-top:1px solid rgba(196,168,130,0.15);
    }
    footer strong{color:var(--bark);font-family:var(--fd);font-style:italic;}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Cafe <em>Backyard</em></div>
  <div class="nav-links" id="navLinks">
    <a href="/">Menu</a>
    <a href="/offers.html" class="active">Offers</a>
    <a href="/profile.html">My Orders</a>
    <a href="/cart.html" class="cart-link">
      🛒 Cart
      <span id="cartBadge">0</span>
    </a>
    <a href="/login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" style="display:none;" onclick="logout();return false;">Logout</a>
  </div>
</nav>

<header class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">Limited time</p>
    <h1>Today's <em>Deals</em></h1>
    <p class="hero-sub">Because good food should always come with great value.</p>
  </div>
</header>

<h2 class="section-title">Special Offers</h2>
<p class="section-sub">Fresh deals, updated daily by our team.</p>

<div id="offers">
  <div class="offer-card skel" style="height:320px"></div>
  <div class="offer-card skel" style="height:320px"></div>
  <div class="offer-card skel" style="height:320px"></div>
</div>

<footer>
  <p>© 2024 <strong>Cafe Backyard</strong> · Made with warmth &amp; good beans.</p>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── CART (same localStorage logic as script.js) ───────────
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(offer, btn) {
  // Offers are treated as menu items — use title as name
  const item = { name: offer.title, price: offer.price };
  const existing = cart.find(i => i.name === item.name);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ name: item.name, price: item.price, qty: 1 });
  }
  saveCart();
  updateCartBadge();

  // Button feedback
  const original = btn.textContent;
  btn.textContent = '✓ Added';
  btn.classList.add('added');
  setTimeout(() => {
    btn.textContent = original;
    btn.classList.remove('added');
  }, 1400);

  showToast(offer.title + ' added to cart! 🌿');
}

function updateCartBadge() {
  const badge = document.getElementById('cartBadge');
  if (!badge) return;
  const total = cart.reduce((s, i) => s + i.qty, 0);
  badge.textContent   = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── AUTH CHECK ────────────────────────────────────────────
fetch("/myorders")
  .then(res => {
    if (res.ok) {
      document.getElementById("loginLink").style.display  = "none";
      document.getElementById("logoutLink").style.display = "inline";
    }
  })
  .catch(() => {});

function logout() {
  fetch("/logout", { method: "POST" })
    .then(() => window.location.href = "/login.html");
}

// ── LOAD OFFERS ───────────────────────────────────────────
fetch("/offers")
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById("offers");
    div.innerHTML = "";

    if (!data.length) {
      div.innerHTML = `
        <div class="empty-state">
          <div class="icon">🌿</div>
          <h3>No offers right now</h3>
          <p>Check back soon — our team adds new deals regularly!</p>
        </div>`;
      return;
    }

    data.forEach((offer, i) => {
      const card = document.createElement("div");
      card.className = "offer-card";
      card.style.animationDelay = (i * 0.07) + 's';

      const imgHTML = (offer.image && offer.image.trim())
        ? `<img src="${offer.image}" class="food-img" alt="${offer.title}">`
        : `<div class="offer-no-img">🌿</div>`;

      card.innerHTML = `
        ${imgHTML}
        <div class="offer-body">
          <p class="offer-tag">Special offer</p>
          <h3 class="offer-title">${offer.title}</h3>
          <p class="offer-desc">${offer.description}</p>
          <div class="offer-footer">
            <span class="offer-price">₹${offer.price}</span>
            <button class="add-btn" id="add-${offer._id}">+ Add to Cart</button>
          </div>
        </div>`;

      // Attach click handler after inserting into DOM
      card.querySelector('.add-btn').addEventListener('click', function() {
        addToCart(offer, this);
      });

      div.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById("offers").innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h3>Could not load offers</h3>
        <p>Please check your connection and try again.</p>
      </div>`;
  });

// ── INIT ─────────────────────────────────────────────────
updateCartBadge();
</script>
</body>
</html>
