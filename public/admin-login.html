<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login · Cafe Backyard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --cream:#F7F0E6;--linen:#EDE3D5;--bark:#C4A882;--soil:#7A5C3E;
      --espresso:#3B2410;--moss:#5A6B4B;--rust:#B05A2F;--sand:#D9C9B0;
      --warm-white:#FBF7F2;
      --fd:'Playfair Display',Georgia,serif;
      --fb:'DM Sans','Segoe UI',sans-serif;
    }

    body{
      font-family:var(--fb);
      background:var(--espresso);
      min-height:100vh;
      display:flex;flex-direction:column;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px);
      pointer-events:none;z-index:0;
    }

    .page-wrap{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:40px 16px;position:relative;z-index:1;
    }

    .auth-card{
      background:var(--warm-white);border-radius:6px;
      width:100%;max-width:400px;overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,0.45);
    }

    /* HEADER */
    .card-head{
      background:var(--espresso);
      padding:30px 36px 26px;
      border-bottom:1px solid rgba(196,168,130,0.2);
      position:relative;overflow:hidden;
    }
    .card-head::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 80% 60% at 90% 50%,rgba(196,168,130,0.06) 0%,transparent 70%);
      pointer-events:none;
    }
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;position:relative;}
    .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--rust);}
    .brand-name{font-family:var(--fd);font-size:0.9rem;color:var(--bark);letter-spacing:0.04em;}
    .brand-name em{font-style:italic;color:var(--sand);}
    .admin-chip{
      margin-left:auto;
      font-size:0.62rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
      background:rgba(176,90,47,0.25);color:var(--bark);
      border:1px solid rgba(176,90,47,0.4);
      padding:3px 9px;border-radius:2px;
    }
    .card-title{font-family:var(--fd);font-size:1.65rem;color:var(--cream);font-weight:400;line-height:1.2;position:relative;}
    .card-title em{font-style:italic;color:var(--bark);}
    .card-sub{color:var(--sand);font-size:0.83rem;margin-top:6px;position:relative;}

    /* BODY */
    .card-body{padding:26px 36px 30px;}

    .field{margin-bottom:18px;}
    .field label{
      display:block;font-size:0.71rem;text-transform:uppercase;
      letter-spacing:0.12em;color:var(--soil);margin-bottom:6px;font-weight:500;
    }
    .input-wrap{position:relative;}
    .field input{
      width:100%;padding:12px 14px;
      border:1.5px solid var(--sand);border-radius:3px;
      font-family:var(--fb);font-size:0.92rem;
      color:var(--espresso);background:var(--cream);
      outline:none;transition:border-color 0.2s,box-shadow 0.2s;
    }
    .field input:focus{border-color:var(--soil);box-shadow:0 0 0 3px rgba(122,92,62,0.1);}
    .field input::placeholder{color:var(--bark);}

    /* toggle password visibility */
    .toggle-pw{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      font-size:0.9rem;color:var(--bark);padding:2px;
      transition:color 0.2s;
    }
    .toggle-pw:hover{color:var(--soil);}

    .submit-btn{
      width:100%;padding:13px;margin-top:4px;
      background:var(--espresso);color:var(--cream);
      border:none;border-radius:3px;cursor:pointer;
      font-family:var(--fb);font-size:0.88rem;font-weight:500;
      letter-spacing:0.07em;text-transform:uppercase;
      transition:background 0.2s,transform 0.15s;
    }
    .submit-btn:hover{background:var(--rust);transform:translateY(-1px);}
    .submit-btn:active{transform:scale(0.98);}
    .submit-btn:disabled{opacity:0.6;cursor:wait;transform:none;}

    .msg{
      font-size:0.82rem;text-align:center;
      margin-top:14px;padding:9px 12px;border-radius:3px;display:none;
    }
    .msg.error  {display:block;background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;}
    .msg.success{display:block;background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}

    /* back link */
    .back-link{
      text-align:center;margin-top:18px;font-size:0.82rem;color:var(--soil);
    }
    .back-link a{color:var(--rust);text-decoration:none;font-weight:500;}
    .back-link a:hover{text-decoration:underline;}

    /* bottom */
    .bottom-brand{text-align:center;padding:20px;position:relative;z-index:1;}
    .bottom-brand p{font-size:0.78rem;color:rgba(196,168,130,0.4);}
    .bottom-brand strong{color:var(--bark);font-family:var(--fd);font-style:italic;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="auth-card">

    <div class="card-head">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">Cafe <em>Backyard</em></div>
        <span class="admin-chip">Admin</span>
      </div>
      <h1 class="card-title">Admin <em>Login</em></h1>
      <p class="card-sub">Restricted area — authorised personnel only.</p>
    </div>

    <div class="card-body">
      <div class="field">
        <label>Username</label>
        <input id="username" type="text" placeholder="admin" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="toggle-pw" type="button" onclick="togglePw()" id="toggleBtn" title="Show/hide password">👁</button>
        </div>
      </div>
      <button class="submit-btn" id="loginBtn" onclick="login()">Sign In</button>
      <div class="msg" id="msg"></div>
      <p class="back-link"><a href="/">← Back to cafe</a></p>
    </div>

  </div>
</div>

<div class="bottom-brand">
  <p>© 2024 <strong>Cafe Backyard</strong> · Admin Portal</p>
</div>

<script>
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function togglePw() {
    const pw  = document.getElementById('password');
    const btn = document.getElementById('toggleBtn');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁';
    }
  }

  function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !password) {
      showMsg("Please fill in both fields.", "error");
      return;
    }

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    fetch("/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    })
    .then(res => {
      if (!res.ok) return res.json().then(d => { throw new Error(d.error || "Invalid credentials"); });
      return res.json();
    })
    .then(() => {
      showMsg("Login successful! Redirecting…", "success");
      setTimeout(() => window.location.href = "/admin.html", 700);
    })
    .catch(err => {
      showMsg(err.message || "Invalid credentials.", "error");
      btn.textContent = 'Sign In';
      btn.disabled = false;
    });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
